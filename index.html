<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Boat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 10px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day-cell {
  position: relative;
  border-radius: 10px;
  height: 60px;
  padding: 6px;
}

/* número */
.day-number {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 12px;
  font-weight: bold;
}

/* centro */
.day-center {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-weight: bold;
}

/* cores */
.free { background: #22c55e; color: white; }
.busy { background: #d946ef; color: white; }
.holiday { background: #f97316; color: white; }
.folga { background: #facc15; color: black; }

/* passado */
.past { background: #d1d5db; }

.weekday {
  text-align: center;
  font-weight: bold;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <h3 id="monthTitle"></h3>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="weekdays"></div>
<div class="calendar" id="calendar"></div>

<script>
const API = "/api/availability";
const PB = 576;

let currentDate = new Date();
currentDate.setDate(1);

const weekdays = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

document.getElementById("weekdays").innerHTML =
  weekdays.map(d => `<div class="weekday">${d}</div>`).join("");

function pad(n){ return String(n).padStart(2,"0"); }

function formatMonth(d){
  return d.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
}

function toYMD(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function renderDay(item){
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const data = new Date(item.date + "T00:00:00");
  const isPast = data < hoje;

  if(isPast){
    return `<div class="day-cell past"></div>`;
  }

  const dia = data.getDate();

  let center = "";

  if(item.status === "busy"){
    center = item.label || "AG";
  }
  else if(item.status === "holiday"){
    center = "F";
  }
  else if(item.status === "folga"){
    center = "fol";
  }

  return `
  <div class="day-cell ${item.status}"
       onclick="selecionarDia('${item.date}','${item.status}')">
    <div class="day-number">${dia}</div>
    ${center ? `<div class="day-center">${center}</div>` : ""}
  </div>`;
}

function selecionarDia(data, status){
  if(status !== "free") return;
  alert("Selecionado: " + data);
}

async function loadCalendar(){
  document.getElementById("monthTitle").innerText = formatMonth(currentDate);

  const start = toYMD(currentDate);

  const res = await fetch(`${API}?pb=${PB}&start=${start}&months=1`);
  const data = await res.json();

  const map = new Map(data.map(d => [d.date, d]));

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);

  const startWeek = firstDay.getDay();

  let html = "";

  for(let i=0;i<startWeek;i++){
    html += `<div></div>`;
  }

  for(let d=1; d<=lastDay.getDate(); d++){
    const date = new Date(year, month, d);
    const ymd = toYMD(date);

    const item = map.get(ymd) || {date: ymd, status:"free"};

    html += renderDay(item);
  }

  document.getElementById("calendar").innerHTML = html;
}

function prevMonth(){
  currentDate.setMonth(currentDate.getMonth()-1);
  loadCalendar();
}

function nextMonth(){
  currentDate.setMonth(currentDate.getMonth()+1);
  loadCalendar();
}

loadCalendar();
</script>

</body>
</html>
