<!DOCTYPE html>
<html>
<head>
  <title>Calendário Boat</title>
</head>
<body>
  <h1>Testando conexão com banco...</h1>
  <div id="resultado">Carregando...</div>

  <script>
    fetch('/api/teste')
      .then(async (res) => {
        const texto = await res.text();
        try {
          const json = JSON.parse(texto);
          document.getElementById('resultado').innerHTML =
            '<pre>' + JSON.stringify(json, null, 2) + '</pre>';
        } catch (e) {
          document.getElementById('resultado').innerHTML =
            '<pre>' + texto + '</pre>';
        }
      })
      .catch(err => {
        document.getElementById('resultado').innerHTML =
          'Erro: ' + err.message;
      });
  </script>
</body>
</html>
