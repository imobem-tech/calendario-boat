<!DOCTYPE html>
<html>
<head>
  <title>Calendário Boat</title>
</head>
<body>

<h1>Calendário (teste)</h1>

<div id="dados"></div>

<script>
fetch('/api/teste')
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById('dados')

    data.forEach(item => {
      const el = document.createElement('div')

      el.innerHTML = `
        <b>ID:</b> ${item.ID} <br>
        <b>Saída:</b> ${item.Dt_Saída} <br>
        <b>Retorno:</b> ${item.Dt_Retorno} <br>
        <b>Responsável:</b> ${item.Colab_Responsavel}
        <hr>
      `

      div.appendChild(el)
    })
  })
</script>

</body>
</html>
