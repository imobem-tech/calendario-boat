<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- ESSENCIAL PARA MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendar</title>

<style>
body{
  font-family: Arial;
  background:#f3f5f9;
  margin:0;
  padding:20px;
}

/* CARD CENTRAL */
.card{
  background:#fff;
  border-radius:20px;
  padding:30px 20px;
  max-width:500px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.05);
}

/* TÍTULO */
h1{
  font-size:36px;
  margin:0 0 20px;
  font-weight:900;
}

/* TEXTOS GRANDES */
.info{
  font-size:24px;
  margin-bottom:15px;
}

.info b{
  font-size:28px;
}

/* SELECT GRANDE */
select{
  width:100%;
  height:65px;
  font-size:26px;
  border-radius:12px;
  padding:5px 10px;
  margin-top:10px;
}

/* BOTÃO GRANDE */
button{
  width:100%;
  height:70px;
  font-size:28px;
  margin-top:20px;
  border-radius:15px;
  border:none;
  background:#dbe2f1;
  color:#1e2a5a;
  font-weight:900;
}

/* MENSAGEM */
.msg{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

.ok{ color:green }
.erro{ color:red }

/* MOBILE MAIS AGRESSIVO */
@media (max-width:600px){

  h1{ font-size:40px }

  .info{ font-size:26px }
  .info b{ font-size:32px }

  select{ font-size:28px; height:70px }

  button{ font-size:30px; height:75px }

  .msg{ font-size:26px }
}
</style>
</head>

<body>

<div class="card">

<h1>Agendar</h1>

<div class="info">Embarcação: <b id="emb"></b></div>
<div class="info">Grupo: <b id="grupo"></b></div>
<div class="info">Data: <b id="data"></b></div>

<select id="hora"></select>

<button onclick="agendar()">CONFIRMAR</button>

<div id="msg" class="msg"></div>

</div>

<script>
const MAP = { a:"1",b:"2",c:"3",d:"4",e:"5",f:"6",g:"7",h:"8",i:"9",j:"0" };

function decode(token){
  const m = token.match(/^([a-j]+)([a-z])([a-j])$/);
  if(!m) return null;

  const pb = m[1].split("").map(x=>MAP[x]).join("");
  const grupo = m[2].toUpperCase() + MAP[m[3]];

  return { pb, grupo };
}

// URL
const qs = new URLSearchParams(location.search);
const token = qs.get("token");
const data = qs.get("data");

const acesso = decode(token);

document.getElementById("emb").innerText = acesso.pb;
document.getElementById("grupo").innerText = acesso.grupo;
document.getElementById("data").innerText = data;

// HORAS
const sel = document.getElementById("hora");

for(let h=10; h<=17; h++){
  for(let m=0; m<60; m+=15){
    if(h===17 && m>0) break;

    const hh = String(h).padStart(2,"0");
    const mm = String(m).padStart(2,"0");

    const opt = document.createElement("option");
    opt.value = `${hh}:${mm}`;
    opt.text = `${hh}:${mm}`;

    sel.appendChild(opt);
  }
}

// AGENDAR
async function agendar(){

  const msg = document.getElementById("msg");
  msg.innerText = "";

  const r = await fetch("/api/agendar",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      token,
      data,
      hora: sel.value
    })
  });

  const j = await r.json();

  if(!r.ok){
    msg.className = "msg erro";
    msg.innerText = j.error;
  }else{
    msg.className = "msg ok";
    msg.innerText = j.msg;

    setTimeout(()=>{
      window.location.href = `/${token}?ym=${data.slice(0,7)}&r=${Date.now()}`;
    },1200);
  }
}
</script>

</body>
</html>
