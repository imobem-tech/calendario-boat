<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agendar</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, Arial;
  background:#f3f4f6;
}

.wrap{
  max-width:720px;
  margin:20px auto;
  padding:12px;
}

.top-card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

/* HEADER */
.title{
  font-size:32px;
  font-weight:800;
  margin:0;
}

.sub-inline{
  font-size:18px;
  font-weight:400;
  color:#6b7280;
  margin-left:6px;
}

/* INFO */
.summary{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:14px;
}

.info-card{
  background:#f9fafb;
  border-radius:12px;
  padding:12px;
}

.info-label{
  font-size:13px;
  color:#6b7280;
}

.info-value{
  font-size:26px;
  font-weight:700;
  margin-top:4px;
}

/* HORÁRIOS */
.slots{
  margin-top:16px;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
}

.slot{
  background:#fff;
  border-radius:12px;
  padding:16px;
  text-align:center;
  font-weight:700;
  border:2px solid #e5e7eb;
  cursor:pointer;
}

.slot.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

/* BOTÃO */
.btn{
  margin-top:16px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  font-size:18px;
  font-weight:700;
}

.btn:disabled{
  background:#cbd5f5;
}

/* RESPONSIVO */
@media (min-width:640px){
  .summary{
    grid-template-columns:repeat(2,1fr);
  }
  .slots{
    grid-template-columns: repeat(4,1fr);
  }
}

@media (max-width:420px){
  .title{
    font-size:26px;
  }
  .sub-inline{
    display:block;
    margin-left:0;
    font-size:15px;
    margin-top:4px;
  }
  .info-value{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <section class="top-card">

    <!-- HEADER -->
    <h1 class="title">
      Agendar <span class="sub-inline">— escolha um horário</span>
    </h1>

    <!-- RESUMO -->
    <div class="summary">

      <div class="info-card">
        <div class="info-label">Embarcação / Grupo</div>
        <div class="info-value" id="embGrupo">-</div>
      </div>

      <div class="info-card">
        <div class="info-label">Data / Dia</div>
        <div class="info-value" id="dataDia">-</div>
      </div>

    </div>

    <!-- HORÁRIOS -->
    <div class="slots" id="slots"></div>

    <!-- BOTÃO -->
    <button class="btn" id="btnConfirmar" disabled>
      CONFIRMAR AGENDAMENTO
    </button>

  </section>
</div>

<script>

/* ================= TOKEN ================= */

function decodeToken(token){
  if(!token) return null;

  const letras = "abcdefghijklmnopqrstuvwxyz";
  const map = {};
  for(let i=0;i<=9;i++){
    map[letras[i]] = i.toString();
  }

  const numeros = token.slice(0,-1).split("").map(l => map[l]).join("");
  const grupoNum = map[token.slice(-1)];

  if(!numeros || grupoNum === undefined) return null;

  return {
    pb: parseInt(numeros),
    grupo: "X" + grupoNum
  };
}

/* ================= DATA ================= */

function formatarDataBR(iso){
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function nomeDiaSemana(iso){
  const [y,m,d] = iso.split("-").map(Number);
  const data = new Date(y, m - 1, d);
  const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  return dias[data.getDay()];
}

/* ================= ELEMENTOS ================= */

const embGrupoEl = document.getElementById("embGrupo");
const dataDiaEl = document.getElementById("dataDia");
const slotsEl = document.getElementById("slots");
const btn = document.getElementById("btnConfirmar");

let horaSelecionada = null;

/* ================= QUERY ================= */

const params = new URLSearchParams(window.location.search);
const token = params.get("token");
const data = params.get("data");

const acesso = decodeToken(token);

/* ================= UI ================= */

function criarSlots(){
  for(let h=10; h<=17; h++){
    for(let m=0; m<60; m+=15){

      if(h===17 && m>0) continue;

      const hora = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;

      const div = document.createElement("div");
      div.className = "slot";
      div.textContent = hora;

      div.onclick = () => {
        document.querySelectorAll(".slot").forEach(s=>s.classList.remove("active"));
        div.classList.add("active");
        horaSelecionada = hora;
        btn.disabled = false;
      };

      slotsEl.appendChild(div);
    }
  }
}

/* ================= INIT ================= */

if(!acesso || !data){
  embGrupoEl.textContent = "-";
  dataDiaEl.textContent = "-";
  alert("Link inválido");
}else{
  embGrupoEl.textContent = `${acesso.pb} ${acesso.grupo}`;
  dataDiaEl.textContent = `${formatarDataBR(data)} ${nomeDiaSemana(data)}`;

  criarSlots();
}

/* ================= CLICK ================= */

btn.onclick = async () => {

  if(!horaSelecionada) return;

  const dt = `${data} ${horaSelecionada}:00`;

  const resp = await fetch("/api/agendar", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      Cod_Emb_PB: acesso.pb,
      Grupo_Comp_letra: acesso.grupo,
      Dt_Agendamento: dt
    })
  });

  const json = await resp.json();

  if(json.erro){
    alert(json.erro);
  }else{
    alert("Agendado com sucesso!");
    location.href = "/";
  }

};

</script>

</body>
</html>
