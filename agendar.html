<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar</title>
  <style>
    :root{
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #10213d;
      --muted: #6b7280;
      --line: #dbe2ea;

      --primary: #1d4ed8;
      --primary-soft: #e8efff;
      --header-bg: #1d4ed8;
      --header-text: #ffffff;

      --slot: #ffffff;
      --slot-border: #d1d5db;
      --slot-active: #1d4ed8;
      --slot-active-text: #ffffff;

      --warn-bg: #fff7ed;
      --warn-text: #c2410c;
      --warn-line: #fdba74;

      --err-bg: #fff1f2;
      --err-text: #dc2626;
      --err-line: #fecdd3;

      --ok-bg: #ecfdf5;
      --ok-text: #15803d;
      --ok-line: #bbf7d0;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px 120px;
    }

    .top-card{
      background: var(--header-bg);
      color: var(--header-text);
      border: 1px solid var(--header-bg);
      border-radius: 22px;
      padding: 14px 14px 12px;
      margin-bottom: 14px;
      box-shadow: 0 1px 0 rgba(16,33,61,.03);
    }

    .title-row{
      display:flex;
      align-items:baseline;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom: 12px;
    }

    .title{
      margin:0;
      font-size: clamp(26px, 7vw, 42px);
      line-height:1;
      font-weight: 900;
      letter-spacing:.2px;
      color:#fff;
    }

    .sub-inline{
      color: rgba(255,255,255,.92);
      font-size: 14px;
      font-weight: 700;
      line-height:1.2;
    }

    .summary{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .info-card{
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 12px 12px 10px;
      min-width: 0;
    }

    .info-label{
      font-size: 12px;
      color: rgba(255,255,255,.9);
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .info-value{
      font-size: clamp(18px, 4.6vw, 28px);
      font-weight: 900;
      line-height: 1.1;
      color: #fff;
      word-break: break-word;
    }

    .section-card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 16px 18px;
      box-shadow: 0 1px 0 rgba(16,33,61,.03);
    }

    .section-title{
      margin:0 0 8px;
      font-size: 24px;
      line-height:1.1;
      font-weight: 900;
    }

    .section-desc{
      margin:0 0 16px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.4;
      font-weight: 700;
    }

    .slots{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .slot-btn{
      width:100%;
      min-height: 76px;
      border-radius: 18px;
      border:2px solid var(--slot-border);
      background: var(--slot);
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      cursor:pointer;
      transition: .15s ease;
      padding: 0 10px;
    }

    .slot-btn.active{
      background: var(--slot-active);
      color: var(--slot-active-text);
      border-color: var(--slot-active);
      box-shadow: 0 8px 22px rgba(29,78,216,.18);
    }

    .slot-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .warn,
    .msg{
      display:none;
      margin-top: 14px;
      border-radius: 18px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 800;
    }

    .warn.show{
      display:block;
      background: var(--warn-bg);
      color: var(--warn-text);
      border:1px solid var(--warn-line);
    }

    .msg.error{
      display:block;
      background: var(--err-bg);
      color: var(--err-text);
      border:1px solid var(--err-line);
    }

    .msg.success{
      display:block;
      background: var(--ok-bg);
      color: var(--ok-text);
      border:1px solid var(--ok-line);
    }

    .fixed-action{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(243,245,249,1) 72%, rgba(243,245,249,0));
      z-index: 50;
    }

    .confirm-btn{
      width: min(760px, calc(100vw - 28px));
      display:block;
      margin: 0 auto;
      height: 64px;
      border:0;
      border-radius: 18px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 21px;
      font-weight: 900;
      letter-spacing: .2px;
      cursor:pointer;
      box-shadow: 0 8px 24px rgba(16,33,61,.08);
    }

    .confirm-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .brand-footer{
  text-align:center;
  margin-top: 18px;
  padding: 6px 4px 0;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .3px;
  opacity: 0.8;
}

    @media (min-width: 640px){
      .slots{
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 900px){
      .slots{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px){
      .wrap{
        padding: 10px 8px 122px;
      }

      .top-card{
        padding: 12px 12px 10px;
        border-radius: 20px;
      }

      .title-row{
        gap:6px;
        margin-bottom: 10px;
      }

      .title{
        font-size: 24px;
      }

      .sub-inline{
        font-size: 12px;
      }

      .summary{
        gap:8px;
      }

      .info-card{
        padding: 10px 10px 9px;
        border-radius: 14px;
      }

      .info-label{
        font-size: 11px;
        margin-bottom: 5px;
      }

      .info-value{
        font-size: 16px;
      }

      .section-card{
        padding: 16px 12px 16px;
        border-radius: 20px;
      }

      .section-title{
        font-size: 22px;
      }

      .section-desc{
        font-size: 14px;
        margin-bottom: 14px;
      }

      .slots{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap:10px;
      }

      .slot-btn{
        min-height: 66px;
        font-size: 18px;
        border-radius: 16px;
      }

      .confirm-btn{
        height: 60px;
        font-size: 18px;
      }

      .brand-footer{
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top-card">
      <div class="title-row">
        <h1 class="title">Agendar</h1>
        <div class="sub-inline">— escolha um horário_2</div>
      </div>

      <div class="summary">
        <div class="info-card">
          <div class="info-label">Embarcação / Grupo</div>
          <div class="info-value" id="embGrupo">-</div>
        </div>

        <div class="info-card">
          <div class="info-label">Data / Dia</div>
          <div class="info-value" id="dataDia">-</div>
        </div>
      </div>
    </section>

    <section class="section-card">
      <h2 class="section-title">Horário</h2>
      <p class="section-desc">Toque em um horário disponível entre 10:00 e 17:00.</p>

      <div class="slots" id="slots"></div>

      <div id="warning" class="warn"></div>
      <div id="msg" class="msg"></div>
    </section>

    <div class="brand-footer">Powered by Allmax Gestão de Cotas®</div>
  </div>

  <div class="fixed-action">
    <button id="btnConfirmar" class="confirm-btn" type="button" disabled>
      CONFIRMAR AGENDAMENTO
    </button>
  </div>

  <script>
    const MAP = {
      a:"1", b:"2", c:"3", d:"4", e:"5",
      f:"6", g:"7", h:"8", i:"9", j:"0"
    };

    function decode(token){
      const t = String(token || "").trim().toLowerCase();
      const m = t.match(/^([a-j]+)([a-z])([a-j])$/);
      if(!m) return null;

      const pb = m[1].split("").map(x => MAP[x]).join("");
      const grupo = m[2].toUpperCase() + MAP[m[3]];

      if(!pb || !grupo) return null;
      return { pb, grupo, token: t };
    }

    function formatarDataBR(iso){
      if(!iso) return "-";
      const [y,m,d] = iso.split("-");
      if(!y || !m || !d) return iso;
      return `${d}/${m}/${y}`;
    }

    function nomeDiaSemana(iso){
      const [y,m,d] = iso.split("-").map(Number);
      const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
      return dias[new Date(y, m - 1, d).getDay()];
    }

    function hojeIsoLocal(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function diaSemanaLocal(iso){
      const [y,m,d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).getDay();
    }

    const qs = new URLSearchParams(window.location.search);
    const token = qs.get("token") || "";
    const data = qs.get("data") || "";
    const acesso = decode(token);

    const embGrupoEl = document.getElementById("embGrupo");
    const dataDiaEl = document.getElementById("dataDia");
    const slotsEl = document.getElementById("slots");
    const warningEl = document.getElementById("warning");
    const msgEl = document.getElementById("msg");
    const btnConfirmar = document.getElementById("btnConfirmar");

    let horaSelecionada = "";

    function setMsg(texto, tipo){
      msgEl.className = "msg";
      msgEl.textContent = "";

      if(!texto) return;

      msgEl.classList.add(tipo === "success" ? "success" : "error");
      msgEl.textContent = texto;
    }

    function setWarning(texto){
      if(!texto){
        warningEl.className = "warn";
        warningEl.textContent = "";
        return;
      }

      warningEl.className = "warn show";
      warningEl.textContent = texto;
    }

    function atualizarBotao(){
      btnConfirmar.disabled = !horaSelecionada;
    }

    function selecionarHora(hora){
      horaSelecionada = hora;

      document.querySelectorAll(".slot-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.hora === hora);
      });

      atualizarBotao();
    }

    function criarBotoesHorario(){
      slotsEl.innerHTML = "";

      for(let h = 10; h <= 17; h++){
        for(let m = 0; m < 60; m += 15){
          if(h === 17 && m > 0) break;

          const hh = String(h).padStart(2, "0");
          const mm = String(m).padStart(2, "0");
          const hora = `${hh}:${mm}`;

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "slot-btn";
          btn.textContent = hora;
          btn.dataset.hora = hora;

          btn.addEventListener("click", () => selecionarHora(hora));
          slotsEl.appendChild(btn);
        }
      }
    }

    function avaliarContingencia(){
      const hoje = hojeIsoLocal();
      const dow = diaSemanaLocal(hoje);
      const mesmaData = data === hoje;

      if(mesmaData && dow >= 2 && dow <= 4){
        setWarning("Agendamento sob regra de contingência.");
      }else{
        setWarning("");
      }
    }

    async function agendar(){
      if(!horaSelecionada) return;

      setMsg("", "");
      btnConfirmar.disabled = true;

      try{
        const resp = await fetch("/api/agendar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token,
            data,
            hora: horaSelecionada
          })
        });

        const json = await resp.json();

        if(!resp.ok){
          setMsg(json.error || "Falha ao agendar.", "error");
          btnConfirmar.disabled = false;
          return;
        }

        setMsg(json.msg || "Agendamento realizado.", "success");

        setTimeout(() => {
          const ym = data.slice(0, 7);
          window.location.href = `/${encodeURIComponent(token)}?ym=${encodeURIComponent(ym)}`;
        }, 1600);

      }catch(err){
        setMsg(err.message || "Erro ao enviar agendamento.", "error");
        btnConfirmar.disabled = false;
      }
    }

    if(!acesso || !data){
      embGrupoEl.textContent = "-";
      dataDiaEl.textContent = "-";
      setMsg("Link de agendamento inválido.", "error");
    }else{
      embGrupoEl.textContent = `${acesso.pb} ${acesso.grupo}`;
      dataDiaEl.textContent = `${formatarDataBR(data)} ${nomeDiaSemana(data)}`;

      criarBotoesHorario();
      avaliarContingencia();
      atualizarBotao();

      btnConfirmar.addEventListener("click", agendar);
    }
  </script>
</body>
</html>
