<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar</title>
  <style>
    :root{
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #10213d;
      --muted: #6b7280;
      --line: #dbe2ea;
      --primary: #1d4ed8;
      --primary-soft: #e8efff;
      --header-bg: #1d4ed8;
      --header-text: #ffffff;
      --slot: #ffffff;
      --slot-border: #d1d5db;
      --slot-active: #1d4ed8;
      --slot-active-text: #ffffff;
      --warn-bg: #fff7ed;
      --warn-text: #c2410c;
      --warn-line: #fdba74;
      --err-bg: #fff1f2;
      --err-text: #dc2626;
      --err-line: #fecdd3;
      --ok-bg: #ecfdf5;
      --ok-text: #15803d;
      --ok-line: #bbf7d0;
      --overlay: rgba(15, 23, 42, 0.52);
    }

    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap{ max-width: 760px; margin: 0 auto; padding: 12px 12px 120px; }
    .top-card{ background: var(--header-bg); color: var(--header-text); border: 1px solid var(--header-bg); border-radius: 22px; padding: 14px 14px 12px; margin-bottom: 14px; box-shadow: 0 1px 0 rgba(16,33,61,.03); }
    .title-row{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; margin-bottom: 12px; }
    .title{ margin:0; font-size: clamp(26px, 7vw, 42px); line-height:1; font-weight: 900; letter-spacing:.2px; color:#fff; }
    .sub-inline{ color: rgba(255,255,255,.92); font-size: 14px; font-weight: 700; line-height:1.2; }
    .summary{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .info-card{ background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; padding: 12px 12px 10px; min-width: 0; }
    .info-label{ font-size: 12px; color: rgba(255,255,255,.9); font-weight: 800; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    .info-value{ font-size: clamp(18px, 4.6vw, 28px); font-weight: 900; line-height: 1.1; color: #fff; word-break: break-word; }
    .section-card{ background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 18px 16px 18px; box-shadow: 0 1px 0 rgba(16,33,61,.03); }
    .section-title{ margin:0 0 8px; font-size: 24px; line-height:1.1; font-weight: 900; }
    .section-desc{ margin:0 0 16px; color: var(--muted); font-size: 16px; line-height: 1.4; font-weight: 700; }
    .slots{ display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; }
    .slot-btn{ width:100%; min-height: 76px; border-radius: 18px; border:2px solid var(--slot-border); background: var(--slot); color: var(--text); font-size: 22px; font-weight: 900; cursor:pointer; transition: .15s ease; padding: 0 10px; }
    .slot-btn.active{ background: var(--slot-active); color: var(--slot-active-text); border-color: var(--slot-active); box-shadow: 0 8px 22px rgba(29,78,216,.18); }
    .slot-btn:disabled{ opacity:.45; cursor:not-allowed; }
    .warn,.msg{ display:none; margin-top: 14px; border-radius: 18px; padding: 14px; font-size: 16px; line-height: 1.4; font-weight: 800; }
    .warn.show{ display:block; background: var(--warn-bg); color: var(--warn-text); border:1px solid var(--warn-line); }
    .msg.error{ display:block; background: var(--err-bg); color: var(--err-text); border:1px solid var(--err-line); }
    .msg.success{ display:block; background: var(--ok-bg); color: var(--ok-text); border:1px solid var(--ok-line); }
    .fixed-action{ position: fixed; left: 0; right: 0; bottom: 0; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(243,245,249,1) 72%, rgba(243,245,249,0)); z-index: 50; }
    .confirm-btn{ width: min(760px, calc(100vw - 28px)); display:block; margin: 0 auto; height: 64px; border:0; border-radius: 18px; background: var(--primary-soft); color: var(--primary); font-size: 21px; font-weight: 900; letter-spacing: .2px; cursor:pointer; box-shadow: 0 8px 24px rgba(16,33,61,.08); }
    .confirm-btn:disabled{ opacity:.55; cursor:not-allowed; }
    .brand-footer{ text-align:center; margin-top: 18px; padding: 6px 4px 0; color: var(--primary); font-size: 13px; font-weight: 700; letter-spacing: .3px; opacity: 0.8; }

    .modal-overlay{
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }
    .modal-overlay.show{
      display: flex;
    }
    .modal-card{
      width: min(480px, 100%);
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(15,23,42,.28);
      overflow: hidden;
      border: 1px solid #e5e7eb;
      animation: popupIn .18s ease;
    }
    @keyframes popupIn{
      from{ transform: translateY(10px) scale(.98); opacity: 0; }
      to{ transform: translateY(0) scale(1); opacity: 1; }
    }
    .modal-head{
      padding: 16px 18px 12px;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }
    .modal-head.error{
      background: var(--err-bg);
      color: var(--err-text);
      border-bottom: 1px solid var(--err-line);
    }
    .modal-head.success{
      background: var(--ok-bg);
      color: var(--ok-text);
      border-bottom: 1px solid var(--ok-line);
    }
    .modal-head.warning{
      background: var(--warn-bg);
      color: var(--warn-text);
      border-bottom: 1px solid var(--warn-line);
    }
    .modal-body{
      padding: 18px;
      font-size: 18px;
      line-height: 1.45;
      color: var(--text);
      font-weight: 800;
      white-space: pre-line;
    }
    .modal-actions{
      padding: 0 18px 18px;
      display: flex;
      justify-content: center;
    }
    .modal-btn{
      min-width: 150px;
      height: 50px;
      border: 0;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    @media (min-width: 640px){ .slots{ grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (min-width: 900px){ .slots{ grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    @media (max-width: 420px){
      .wrap{ padding: 10px 8px 122px; }
      .top-card{ padding: 12px 12px 10px; border-radius: 20px; }
      .title-row{ gap:6px; margin-bottom: 10px; }
      .title{ font-size: 24px; }
      .sub-inline{ font-size: 12px; }
      .summary{ gap:8px; }
      .info-card{ padding: 10px 10px 9px; border-radius: 14px; }
      .info-label{ font-size: 11px; margin-bottom: 5px; }
      .info-value{ font-size: 16px; }
      .section-card{ padding: 16px 12px 16px; border-radius: 20px; }
      .section-title{ font-size: 22px; }
      .section-desc{ font-size: 14px; margin-bottom: 14px; }
      .slots{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; }
      .slot-btn{ min-height: 66px; font-size: 18px; border-radius: 16px; }
      .confirm-btn{ height: 60px; font-size: 18px; }
      .brand-footer{ font-size: 13px; }
      .modal-head{ font-size: 20px; }
      .modal-body{ font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top-card">
      <div class="title-row">
        <h1 class="title">Agendar</h1>
        <div class="sub-inline"> Allmax Gestão de Cotas</div>
      </div>

      <div class="summary">
        <div class="info-card">
          <div class="info-label">Embarcação / Grupo</div>
          <div class="info-value" id="embGrupo">-</div>
        </div>

        <div class="info-card">
          <div class="info-label">Data / Dia</div>
          <div class="info-value" id="dataDia">-</div>
        </div>
      </div>
    </section>

    <section class="section-card">
      <h2 class="section-title">Horário</h2>
      <p class="section-desc">Qual sua previsão de saída? Escolha o horário abaixo:</p>

      <div class="slots" id="slots"></div>

      <div id="warning" class="warn"></div>
      <div id="msg" class="msg"></div>
    </section>

    <div id="brandFooter" class="brand-footer"></div>
  </div>

  <div class="fixed-action">
    <button id="btnConfirmar" class="confirm-btn" type="button" disabled>
      CONFIRMAR AGENDAMENTO
    </button>
  </div>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div id="modalTitle" class="modal-head">Aviso</div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modalBtn" type="button" class="modal-btn">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    const MAP = {
      a:"1", b:"2", c:"3", d:"4", e:"5",
      f:"6", g:"7", h:"8", i:"9", j:"0"
    };

    function somenteDigitos(txt){
      return String(txt || "").replace(/\D+/g, "");
    }

    function decodificar(txt){
      return String(txt || "")
        .split("")
        .map(ch => MAP[ch] || "")
        .join("");
    }

    function calcularDV(pb, grupoNum, autorizado){
      const base = `${pb}${grupoNum}${autorizado}`;
      const soma = base.split("").reduce((acc,n)=>acc+Number(n),0);
      return String(soma).padStart(2,"0");
    }

    function decode(token){
      const t = String(token || "").trim().toLowerCase();

      const m = t.match(/^([a-j]+)([a-z])([a-j])([a-j]{4})([a-j]{2})$/);
      if(!m) return null;

      const pb = decodificar(m[1]);
      const grupoLetra = m[2].toUpperCase();
      const grupoNum = decodificar(m[3]);
      const autorizado = decodificar(m[4]);
      const dv = decodificar(m[5]);

      if(!pb || !grupoNum || !autorizado || !dv) return null;

      const dvCalc = calcularDV(pb, grupoNum, autorizado);
      if(dv !== dvCalc) return null;

      return {
        pb,
        grupo: `${grupoLetra}${grupoNum}`,
        codAutorizado: autorizado,
        token: t
      };
    }

    function formatarDataBR(iso){
      if(!iso) return "-";
      const [y,m,d] = iso.split("-");
      if(!y || !m || !d) return iso;
      return `${d}/${m}/${y}`;
    }

    function nomeDiaSemana(iso){
      const [y,m,d] = iso.split("-").map(Number);
      const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
      return dias[new Date(y, m - 1, d).getDay()];
    }

    function hojeIsoLocal(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function diaSemanaLocal(iso){
      const [y,m,d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).getDay();
    }

   
    const VERSAO_HTML = "V.2604231522";

function aplicarAssinatura(){
  const el = document.getElementById("brandFooter");
  if (el) {
    el.textContent = `Powered by Allmax Gestão de Cotas® ${VERSAO_HTML}`;
  }
}

    const qs = new URLSearchParams(window.location.search);
    const token = qs.get("token") || "";
    const data = qs.get("data") || "";
    const acesso = decode(token);

    const embGrupoEl = document.getElementById("embGrupo");
    const dataDiaEl = document.getElementById("dataDia");
    const slotsEl = document.getElementById("slots");
    const warningEl = document.getElementById("warning");
    const msgEl = document.getElementById("msg");
    const btnConfirmar = document.getElementById("btnConfirmar");

    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalBtn = document.getElementById("modalBtn");

    let horaSelecionada = "";
    let redirectOnClose = "";

    function abrirModal(titulo, texto, tipo){
      modalTitle.textContent = titulo || "Aviso";
      modalBody.textContent = texto || "";
      modalTitle.className = "modal-head";
      modalTitle.classList.add(tipo || "warning");
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden", "false");
      modalBtn.focus();
    }

    function fecharModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden", "true");

   if (redirectOnClose) {
  const destino = redirectOnClose;
  redirectOnClose = "";

  // abre WhatsApp primeiro
  window.open(LINK_WPP, "_blank");

  // depois volta pro calendário
  window.location.href = destino;
}
          }

    modalBtn.addEventListener("click", fecharModal);

    modalOverlay.addEventListener("click", function(e){
      if(e.target === modalOverlay){
        fecharModal();
      }
    });

    document.addEventListener("keydown", function(e){
      if(e.key === "Escape" && modalOverlay.classList.contains("show")){
        fecharModal();
      }
    });

    function setMsg(texto, tipo, popup = false){
      msgEl.className = "msg";
      msgEl.textContent = "";

      if(!texto) return;

      const ehSuccess = tipo === "success";
      msgEl.classList.add(ehSuccess ? "success" : "error");
      msgEl.textContent = texto;

      if(popup){
        if(ehSuccess){
          abrirModal("Agendamento confirmado", texto, "success");
        }else{
          abrirModal("Atenção", texto, "error");
        }
      }
    }

    function setWarning(texto, popup = false){
      if(!texto){
        warningEl.className = "warn";
        warningEl.textContent = "";
        return;
      }

      warningEl.className = "warn show";
      warningEl.textContent = texto;

      if(popup){
        abrirModal("Aviso importante", texto, "warning");
      }
    }

    function atualizarBotao(){
      btnConfirmar.disabled = !horaSelecionada;
    }

    function selecionarHora(hora){
      horaSelecionada = hora;
      document.querySelectorAll(".slot-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.hora === hora);
      });
      atualizarBotao();
    }

    function criarBotoesHorario(){
      slotsEl.innerHTML = "";
      for(let h = 10; h <= 17; h++){
        for(let m = 0; m < 60; m += 15){
          if(h === 17 && m > 0) break;
          const hh = String(h).padStart(2, "0");
          const mm = String(m).padStart(2, "0");
          const hora = `${hh}:${mm}`;
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "slot-btn";
          btn.textContent = hora;
          btn.dataset.hora = hora;
          btn.addEventListener("click", () => selecionarHora(hora));
          slotsEl.appendChild(btn);
        }
      }
    }

    function avaliarContingencia(){
      const hoje = hojeIsoLocal();
      const dow = diaSemanaLocal(hoje);
      const mesmaData = data === hoje;
      if(mesmaData && dow >= 2 && dow <= 4){
        setWarning("Agendamento sob regra de contingência.");
      }else{
        setWarning("");
      }
    }

    async function agendar(){
      if(!horaSelecionada) return;

      setMsg("", "");
      btnConfirmar.disabled = true;
      redirectOnClose = "";

      try{
        const resp = await fetch("/api/agendar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, data, hora: horaSelecionada })
        });

        const json = await resp.json();

if(!resp.ok){
  const textoErro = json.error || "Falha ao agendar.";

  setMsg(textoErro, "error", true);
  btnConfirmar.disabled = false;
  return;
}
       const textoSucesso = json.msg || "Agendamento realizado.";

// monta texto da saída
const grupo = acesso.grupo;
const dataBr = formatarDataBR(data);
const hora = horaSelecionada;

const textoCopiar = `${grupo} - ${dataBr}: ${hora}h`;

// copia pro clipboard
try {
  await navigator.clipboard.writeText(textoCopiar);
} catch (e) {
  console.warn("Falha ao copiar:", e);
}

// mensagem final (em linha como você pediu)
const mensagemFinal = `${textoSucesso}\n${textoCopiar}`;

setMsg(mensagemFinal, "success", true);

        const ym = data.slice(0, 7);
        redirectOnClose = `/${encodeURIComponent(token)}?ym=${encodeURIComponent(ym)}`;

      }catch(err){
        const textoErro = err && err.message
          ? err.message
          : "Erro ao enviar agendamento.";

        setMsg(textoErro, "error", true);
        btnConfirmar.disabled = false;
      }
    }

    if(!acesso || !data){
      embGrupoEl.textContent = "-";
      dataDiaEl.textContent = "-";
      setMsg("Link de agendamento inválido.", "error", true);
      btnConfirmar.disabled = true;
    }else{
      embGrupoEl.textContent = `${acesso.pb} ${acesso.grupo}`;
      dataDiaEl.textContent = `${formatarDataBR(data)} ${nomeDiaSemana(data)}`;
      criarBotoesHorario();
      avaliarContingencia();
      atualizarBotao();
      btnConfirmar.addEventListener("click", agendar);
    }

    aplicarAssinatura();
  </script>
</body>
</html>
