<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 460px;
      margin: 40px auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 22px;
      font-size: 24px;
      text-align: center;
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .campo input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #cfd6dd;
      border-radius: 8px;
      font-size: 15px;
    }

    .acoes {
      margin-top: 20px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 16px;
      cursor: pointer;
      background: #0d6efd;
      color: #fff;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .assinatura {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .popup-box {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .popup-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .popup-message {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-line;
      margin-bottom: 20px;
    }

    .popup-button {
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      min-width: 110px;
    }

    .popup-button:hover {
      opacity: 0.94;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agendamento</h1>

    <form id="formAgendamento">
      <div class="campo">
        <label for="token">Token</label>
        <input type="text" id="token" name="token" required />
      </div>

      <div class="campo">
        <label for="data">Data</label>
        <input type="date" id="data" name="data" required />
      </div>

      <div class="campo">
        <label for="hora">Hora</label>
        <input type="time" id="hora" name="hora" required />
      </div>

      <div class="acoes">
        <button type="submit" class="btn">Agendar</button>
      </div>
    </form>

    <div id="assinaturaRodape" class="assinatura"></div>
  </div>

  <div id="popupOverlay" class="popup-overlay">
    <div class="popup-box">
      <div class="popup-title">Aviso</div>
      <div id="popupMensagem" class="popup-message"></div>
      <button id="popupFechar" class="popup-button" type="button">Fechar</button>
    </div>
  </div>

  <script>
    function gerarVersaoFront() {
      const agora = new Date();
      const yy = String(agora.getFullYear()).slice(-2);
      const mm = String(agora.getMonth() + 1).padStart(2, "0");
      const dd = String(agora.getDate()).padStart(2, "0");
      const hh = String(agora.getHours()).padStart(2, "0");
      const nn = String(agora.getMinutes()).padStart(2, "0");
      return `${yy}${mm}${dd}${hh}${nn}`;
    }

    function aplicarAssinatura() {
      const el = document.getElementById("assinaturaRodape");
      el.textContent = `Powered by Allmax Gestão de Cotas® V.${gerarVersaoFront()}`;
    }

    function mostrarPopup(msg, versao) {
      const overlay = document.getElementById("popupOverlay");
      const mensagem = document.getElementById("popupMensagem");
      const fechar = document.getElementById("popupFechar");

      let texto = msg || "";
      if (versao) {
        texto += `\n${versao}`;
      }

      mensagem.textContent = texto;
      overlay.style.display = "flex";

      fechar.onclick = function () {
        overlay.style.display = "none";
      };
    }

    document.getElementById("formAgendamento").addEventListener("submit", async function (e) {
      e.preventDefault();

      const token = document.getElementById("token").value.trim();
      const data = document.getElementById("data").value;
      const hora = document.getElementById("hora").value;

      try {
        const resp = await fetch("/api/agendar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token, data, hora })
        });

        const retorno = await resp.json();

        if (!resp.ok) {
          mostrarPopup(retorno.error || "Erro ao agendar.", retorno.versao);
          return;
        }

        mostrarPopup(retorno.msg, retorno.versao);

      } catch (err) {
        mostrarPopup("Falha de comunicação com a API.", `v. ${gerarVersaoFront()}`);
      }
    });

    aplicarAssinatura();
  </script>
</body>
</html>
