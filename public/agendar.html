<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar</title>

  <!-- Desabilitar cache (força refresh sempre) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS Safari: força revalidação -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root{
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #10213d;
      --muted: #6b7280;
      --line: #dbe2ea;
      --primary: #1d4ed8;
      --primary-soft: #e8efff;
      --header-bg: #1d4ed8;
      --header-text: #ffffff;
      --slot: #ffffff;
      --slot-border: #d1d5db;
      --slot-active: #1d4ed8;
      --slot-active-text: #ffffff;
      --warn-bg: #fff7ed;
      --warn-text: #c2410c;
      --warn-line: #fdba74;
      --err-bg: #fff1f2;
      --err-text: #dc2626;
      --err-line: #fecdd3;
      --ok-bg: #ecfdf5;
      --ok-text: #15803d;
      --ok-line: #bbf7d0;
      --overlay: rgba(15, 23, 42, 0.52);
    }

    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap{ max-width: 760px; margin: 0 auto; padding: 12px 12px 120px; }
    .top-card{ background: var(--header-bg); color: var(--header-text); border: 1px solid var(--header-bg); border-radius: 22px; padding: 14px 14px 12px; margin-bottom: 14px; box-shadow: 0 1px 0 rgba(16,33,61,.03); }
    .title-row{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; margin-bottom: 12px; }
    .title{ margin:0; font-size: clamp(26px, 7vw, 42px); line-height:1; font-weight: 900; letter-spacing:.2px; color:#fff; }
    .sub-inline{ color: rgba(255,255,255,.92); font-size: 14px; font-weight: 700; line-height:1.2; }
    .summary{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .info-card{ background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; padding: 12px 12px 10px; min-width: 0; }
    .info-label{ font-size: 12px; color: rgba(255,255,255,.9); font-weight: 800; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    .info-value{ font-size: clamp(18px, 4.6vw, 28px); font-weight: 900; line-height: 1.1; color: #fff; word-break: break-word; }
    .section-card{ background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 18px 16px 18px; box-shadow: 0 1px 0 rgba(16,33,61,.03); }
    .section-title{ margin:0 0 8px; font-size: 24px; line-height:1.1; font-weight: 900; }
    .section-desc{ margin:0 0 16px; color: var(--muted); font-size: 16px; line-height: 1.4; font-weight: 700; }
    .slots{ display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px; }
    .slot-btn{ width:100%; min-height: 76px; border-radius: 18px; border:2px solid var(--slot-border); background: var(--slot); color: var(--text); font-size: 22px; font-weight: 900; cursor:pointer; transition: .15s ease; padding: 0 10px; }
    .slot-btn.active{ background: var(--slot-active); color: var(--slot-active-text); border-color: var(--slot-active); box-shadow: 0 8px 22px rgba(29,78,216,.18); }
    .slot-btn:disabled{ opacity:.45; cursor:not-allowed; }
    .warn,.msg{ display:none; margin-top: 14px; border-radius: 18px; padding: 14px; font-size: 16px; line-height: 1.4; font-weight: 800; }
    .warn.show{ display:block; background: var(--warn-bg); color: var(--warn-text); border:1px solid var(--warn-line); }
    .msg.error{ display:block; background: var(--err-bg); color: var(--err-text); border:1px solid var(--err-line); }
    .msg.success{ display:block; background: var(--ok-bg); color: var(--ok-text); border:1px solid var(--ok-line); }
    .fixed-action{ position: fixed; left: 0; right: 0; bottom: 0; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(243,245,249,1) 72%, rgba(243,245,249,0)); z-index: 50; }
    .confirm-btn{ width: min(760px, calc(100vw - 28px)); display:block; margin: 0 auto; height: 64px; border:0; border-radius: 18px; background: var(--primary-soft); color: var(--primary); font-size: 21px; font-weight: 900; letter-spacing: .2px; cursor:pointer; box-shadow: 0 8px 24px rgba(16,33,61,.08); }
    .confirm-btn:disabled{ opacity:.55; cursor:not-allowed; }
    .brand-footer{ text-align:center; margin-top: 18px; padding: 6px 4px 0; color: var(--primary); font-size: 13px; font-weight: 700; letter-spacing: .3px; opacity: 0.8; }

    .modal-overlay{
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }
    .modal-overlay.show{
      display: flex;
    }
    .modal-card{
      width: min(480px, 100%);
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(15,23,42,.28);
      overflow: hidden;
      border: 1px solid #e5e7eb;
      animation: popupIn .18s ease;
    }
    @keyframes popupIn{
      from{ transform: translateY(10px) scale(.98); opacity: 0; }
      to{ transform: translateY(0) scale(1); opacity: 1; }
    }
    .modal-head{
      padding: 16px 18px 12px;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }
    .modal-head.error{
      background: var(--err-bg);
      color: var(--err-text);
      border-bottom: 1px solid var(--err-line);
    }
    .modal-head.success{
      background: var(--ok-bg);
      color: var(--ok-text);
      border-bottom: 1px solid var(--ok-line);
    }
    .modal-head.warning{
      background: var(--warn-bg);
      color: var(--warn-text);
      border-bottom: 1px solid var(--warn-line);
    }
    .modal-body{
      padding: 18px;
      font-size: 18px;
      line-height: 1.45;
      color: var(--text);
      font-weight: 800;
      white-space: pre-line;
    }
    .modal-actions{
      padding: 0 18px 18px;
      display: flex;
      justify-content: center;
    }
    .modal-btn{
      min-width: 150px;
      height: 50px;
      border: 0;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .section-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 8px; gap: 8px; }
    .section-header .section-title{ margin:0; }
    .btn-voltar{ display:inline-flex; align-items:center; gap:6px; background: var(--primary-soft); color: var(--primary); font-size: 15px; font-weight: 800; border: none; border-radius: 12px; padding: 8px 16px; cursor:pointer; text-decoration:none; }
    .btn-voltar:active{ opacity:.8; }
    .btn-previsao{ display:inline-flex; align-items:center; gap:6px; background: #4CAF50; color: white; font-size: 15px; font-weight: 800; border: none; border-radius: 12px; padding: 8px 16px; cursor:pointer; transition: all 0.3s; }
    .btn-previsao:hover{ background: #45a049; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3); }
    .btn-previsao:active{ opacity:.8; transform: translateY(0); }

    @media (min-width: 640px){ .slots{ grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (min-width: 900px){ .slots{ grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    @media (max-width: 420px){
      .wrap{ padding: 10px 8px 122px; }
      .top-card{ padding: 12px 12px 10px; border-radius: 20px; }
      .title-row{ gap:6px; margin-bottom: 10px; }
      .title{ font-size: 24px; }
      .sub-inline{ font-size: 12px; }
      .summary{ gap:8px; }
      .info-card{ padding: 10px 10px 9px; border-radius: 14px; }
      .info-label{ font-size: 11px; margin-bottom: 5px; }
      .info-value{ font-size: 16px; }
      .section-card{ padding: 16px 12px 16px; border-radius: 20px; }
      .section-title{ font-size: 22px; }
      .section-desc{ font-size: 14px; margin-bottom: 14px; }
      .slots{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; }
      .slot-btn{ min-height: 66px; font-size: 18px; border-radius: 16px; }
      .confirm-btn{ height: 60px; font-size: 18px; }
      .brand-footer{ font-size: 13px; }
      .modal-head{ font-size: 20px; }
      .modal-body{ font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top-card">
      <div class="title-row">
        <h1 class="title">Agendar</h1>
        <div class="sub-inline"> Allmax Gestão de Cotas</div>
      </div>

      <div class="summary">
        <div class="info-card">
          <div class="info-label">Embarcação / Grupo</div>
          <div class="info-value" id="embGrupo">-</div>
        </div>

        <div class="info-card">
          <div class="info-label">Data / Dia</div>
          <div class="info-value" id="dataDia">-</div>
        </div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-header">
        <h2 class="section-title">Horário</h2>
        <button class="btn-previsao" id="btnPrevisao" type="button">🌤️ Previsão</button>
        <button class="btn-voltar" id="btnVoltar" type="button">← Voltar</button>
      </div>
      <p class="section-desc">Qual sua previsão de saída? Escolha o horário abaixo:</p>

      <div class="slots" id="slots"></div>

      <div id="warning" class="warn"></div>
      <div id="msg" class="msg"></div>
    </section>

    <div id="brandFooter" class="brand-footer"></div>
  </div>

  <div class="fixed-action">
    <button id="btnConfirmar" class="confirm-btn" type="button" disabled>
      CONFIRMAR AGENDAMENTO
    </button>
  </div>

  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div id="modalTitle" class="modal-head">Aviso</div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modalBtn" type="button" class="modal-btn">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    const MAP = {
      a:"1", b:"2", c:"3", d:"4", e:"5",
      f:"6", g:"7", h:"8", i:"9", j:"0"
    };

    function somenteDigitos(txt){
      return String(txt || "").replace(/\D+/g, "");
    }

    function decodificar(txt){
      return String(txt || "")
        .split("")
        .map(ch => MAP[ch] || "")
        .join("");
    }

    function calcularDV(pb, grupoNum, autorizado, mmdd){
      const base = `${pb}${grupoNum}${autorizado}${mmdd}`;
      const soma = base.split("").reduce((acc,n)=>acc+Number(n),0);
      return String(soma).padStart(2,"0");
    }

    function decode(token){
      const t = String(token || "").trim().toLowerCase();

      // Novo formato com MMDD: [pb][letra][grupoNum][autorizado4][mmdd4][dv2]
      
const m = t.match(/^([a-j]+)([a-z0-9])([a-j]+)([a-j]{4})([a-j]{4})([a-j]{2})$/);
      
      if(!m) return null;

      const pb = decodificar(m[1]);
      const grupoLetra = m[2].toUpperCase();
      const grupoNum = decodificar(m[3]);
      const autorizado = decodificar(m[4]);
      const mmdd = decodificar(m[5]).padStart(4, "0");
      const dv = decodificar(m[6]);

      if(!pb || !grupoNum || !autorizado || !dv) return null;

      // Valida MMDD: token deve ser do dia atual (horário Brasil)
      const agora = new Date(new Date().toLocaleString("en-US", { timeZone: "America/Sao_Paulo" }));
      const mmHoje = String(agora.getMonth() + 1).padStart(2, "0");
      const ddHoje = String(agora.getDate()).padStart(2, "0");
      const mmddHoje = `${mmHoje}${ddHoje}`;

      if(mmdd !== mmddHoje) return null; // token expirado

      const dvCalc = calcularDV(pb, grupoNum, autorizado, mmdd);
      if(dv !== dvCalc) return null;

      // Monta grupo final: letra já está uppercase em grupoLetra
      const grupoFinal = `${grupoLetra}${grupoNum}`;

      return {
        pb,
        grupo: grupoFinal,
        codAutorizado: autorizado,
        token: t
      };
    }

    function formatarDataBR(iso){
      if(!iso) return "-";
      const [y,m,d] = iso.split("-");
      if(!y || !m || !d) return iso;
      return `${d}/${m}/${y}`;
    }

    function nomeDiaSemana(iso){
      const [y,m,d] = iso.split("-").map(Number);
      const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
      return dias[new Date(y, m - 1, d).getDay()];
    }

    function hojeIsoLocal(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function diaSemanaLocal(iso){
      const [y,m,d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d).getDay();
    }

   
    const VERSAO_HTML = "V.2605252320";

function aplicarAssinatura(){
  const el = document.getElementById("brandFooter");
  if (el) {
    el.textContent = `Powered by Allmax Gestão de Cotas® ${VERSAO_HTML}`;
  }
}

    const qs = new URLSearchParams(window.location.search);
    const token = qs.get("t") || qs.get("token") || "";
    const data = qs.get("data") || new Date(new Date().toLocaleString("en-US", { timeZone: "America/Sao_Paulo" })).toISOString().slice(0, 10);
    const acesso = decode(token);

    const embGrupoEl = document.getElementById("embGrupo");
    const dataDiaEl = document.getElementById("dataDia");
    const slotsEl = document.getElementById("slots");
    const warningEl = document.getElementById("warning");
    const msgEl = document.getElementById("msg");
    const btnConfirmar = document.getElementById("btnConfirmar");

    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalBtn = document.getElementById("modalBtn");

    let horaSelecionada = "";
    let redirectOnClose = "";

    function abrirModal(titulo, texto, tipo){
      modalTitle.textContent = titulo || "Aviso";
      modalBody.textContent = texto || "";
      modalTitle.className = "modal-head";
      modalTitle.classList.add(tipo || "warning");
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden", "false");
      modalBtn.focus();
    }

    function fecharModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden", "true");

      if (redirectOnClose) {
        const destino = redirectOnClose;
        redirectOnClose = "";
        window.location.href = destino;
      }
    }

    modalBtn.addEventListener("click", fecharModal);

    modalOverlay.addEventListener("click", function(e){
      if(e.target === modalOverlay){
        fecharModal();
      }
    });

    document.addEventListener("keydown", function(e){
      if(e.key === "Escape" && modalOverlay.classList.contains("show")){
        fecharModal();
      }
    });

    function setMsg(texto, tipo, popup = false){
      msgEl.className = "msg";
      msgEl.textContent = "";

      if(!texto) return;

      const ehSuccess = tipo === "success";
      msgEl.classList.add(ehSuccess ? "success" : "error");
      msgEl.textContent = texto;

      if(popup){
        if(ehSuccess){
          abrirModal("Agendamento confirmado", texto, "success");
        }else{
          abrirModal("Atenção", texto, "error");
        }
      }
    }

    function setWarning(texto, popup = false){
      if(!texto){
        warningEl.className = "warn";
        warningEl.textContent = "";
        return;
      }

      warningEl.className = "warn show";
      warningEl.textContent = texto;

      if(popup){
        abrirModal("Aviso importante", texto, "warning");
      }
    }

    function atualizarBotao(){
      btnConfirmar.disabled = !horaSelecionada;
    }

    function selecionarHora(hora){
      horaSelecionada = hora;
      document.querySelectorAll(".slot-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.hora === hora);
      });
      atualizarBotao();
    }

function agoraSaoPaulo() {
  const partes = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Sao_Paulo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(new Date());

  const get = tipo => partes.find(p => p.type === tipo)?.value;

  return {
    iso: `${get("year")}-${get("month")}-${get("day")}`,
    hora: Number(get("hour")),
    minuto: Number(get("minute"))
  };
}

function arredondarParaProximo15(hora, minuto) {
  let total = hora * 60 + minuto;
  const resto = total % 15;

  if (resto !== 0) {
    total += 15 - resto;
  }

  return total;
}

function criarBotoesHorario() {
  slotsEl.innerHTML = "";

  const inicioPadrao = 11 * 60; // 11:00
  const fimDia = 17 * 60;       // 17:00

  let inicioMinutos = inicioPadrao;
  const agora = agoraSaoPaulo();

  if (data === agora.iso) {
    const limiteComPrazo = arredondarParaProximo15(
      agora.hora + 2,
      agora.minuto
    );

    inicioMinutos = Math.max(inicioPadrao, limiteComPrazo);
  }

  for (let total = inicioMinutos; total <= fimDia; total += 15) {
    const h = Math.floor(total / 60);
    const m = total % 60;

    const hh = String(h).padStart(2, "0");
    const mm = String(m).padStart(2, "0");
    const hora = `${hh}:${mm}`;

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "slot-btn";
    btn.textContent = hora;
    btn.dataset.hora = hora;
    btn.addEventListener("click", () => selecionarHora(hora));

    slotsEl.appendChild(btn);
  }

  if (!slotsEl.children.length) {
    setWarning("Não há mais horários disponíveis para hoje respeitando o prazo mínimo de 2 horas.", true);
  }
}
    function avaliarContingencia(){
      const hoje = hojeIsoLocal();
      const dow = diaSemanaLocal(hoje);
      const mesmaData = data === hoje;
      if(mesmaData && dow >= 2 && dow <= 4){
        setWarning("Agendamento sob regra de contingência.");
      }else{
        setWarning("");
      }
    }

    async function agendar(){
      if(!horaSelecionada) return;

      setMsg("", "");
      btnConfirmar.disabled = true;
      redirectOnClose = "";

      try{
        const resp = await fetch("/api/agendar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, data, hora: horaSelecionada })
        });

        const json = await resp.json();

if(!resp.ok){
  const textoErro = json.error || "Falha ao agendar.";

  setMsg(textoErro, "error", true);
  btnConfirmar.disabled = false;
  return;
}
       const textoSucesso = json.msg || "Agendamento realizado.";

        setMsg(textoSucesso, "success", true);

        const ym = data.slice(0, 7);
        redirectOnClose = `/${encodeURIComponent(token)}?ym=${encodeURIComponent(ym)}`;

      }catch(err){
        const textoErro = err && err.message
          ? err.message
          : "Erro ao enviar agendamento.";

        setMsg(textoErro, "error", true);
        btnConfirmar.disabled = false;
      }
    }

    if(!acesso || !data){
      embGrupoEl.textContent = "-";
      dataDiaEl.textContent = "-";
      setMsg("Link de agendamento inválido.", "error", true);
      btnConfirmar.disabled = true;
    }else{
      embGrupoEl.textContent = `${acesso.pb} ${acesso.grupo}`;
      dataDiaEl.textContent = `${formatarDataBR(data)} ${nomeDiaSemana(data)}`;
      criarBotoesHorario();
      avaliarContingencia();
      atualizarBotao();
      btnConfirmar.addEventListener("click", agendar);
    }

    // Botão Voltar — retorna ao calendário preservando o mês
    document.getElementById("btnVoltar").addEventListener("click", () => {
      const ym = data ? data.slice(0, 7) : "";
      const url = token
        ? `/${encodeURIComponent(token)}?ym=${encodeURIComponent(ym)}`
        : "/";
      window.location.href = url;
    });

    aplicarAssinatura();

    // ============================================================
    // GARANTIR REFRESH EM TODOS OS DISPOSITIVOS
    // ============================================================

    // Limpar service workers (podem cachear)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(reg => reg.unregister())
      })
    }

    // Limpar cache do navegador ao carregar
    if ('caches' in window) {
      caches.keys().then(names => {
        names.forEach(name => caches.delete(name))
      })
    }

    // Atualizar ao voltar do background (iOS Safari)
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        console.log('🔄 Voltou do cache - recarregando...')
        window.location.reload(true)
      }
    })

    // ============================================================
    // BOTÃO PREVISÃO DO TEMPO
    // V.2606051130
    // ============================================================
    document.getElementById("btnPrevisao").addEventListener("click", async () => {
      const modal = document.getElementById("modalPrevisao");
      const conteudo = document.getElementById("previsaoConteudo");
      const loading = document.getElementById("previsaoLoading");

      // Mostrar modal com loading
      modal.style.display = "flex";
      loading.style.display = "block";
      conteudo.innerHTML = "";

      try {
        // Calcular dias à frente baseado na data selecionada
        const dataSelecionada = new Date(data + 'T12:00:00');
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        dataSelecionada.setHours(0, 0, 0, 0);

        const diasAFrente = Math.floor((dataSelecionada - hoje) / (1000 * 60 * 60 * 24));

        // Validar limite de 15 dias
        if (diasAFrente < 0) {
          loading.style.display = "none";
          conteudo.innerHTML = `<div style="text-align: center; padding: 30px;">
            <p style="font-size: 48px; margin: 0;">⚠️</p>
            <h3 style="color: #f57c00; margin: 16px 0;">Data no Passado</h3>
            <p style="color: #666;">A previsão só está disponível para datas futuras.</p>
            <button onclick="document.getElementById('modalPrevisao').style.display='none'" style="margin-top: 20px; background: #1976d2; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; cursor: pointer; font-weight: 600;">Fechar</button>
          </div>`;
          return;
        }

        if (diasAFrente > 15) {
          loading.style.display = "none";
          conteudo.innerHTML = `<div style="text-align: center; padding: 30px;">
            <p style="font-size: 48px; margin: 0;">📅</p>
            <h3 style="color: #f57c00; margin: 16px 0;">Previsão Máxima: 15 Dias</h3>
            <p style="color: #666;">A previsão meteorológica está disponível apenas para os próximos 15 dias.</p>
            <p style="color: #999; font-size: 14px; margin-top: 12px;">Data selecionada: ${diasAFrente} dias à frente</p>
            <button onclick="document.getElementById('modalPrevisao').style.display='none'" style="margin-top: 20px; background: #1976d2; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; cursor: pointer; font-weight: 600;">Fechar</button>
          </div>`;
          return;
        }

        // Buscar previsão via API
        const apiUrl = window.location.hostname === 'localhost'
          ? 'http://localhost:3000'
          : 'https://zucchini-achievement-production.up.railway.app';

        const response = await fetch(`${apiUrl}/previsao`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ diasAFrente })
        });

        if (!response.ok) throw new Error('Erro ao buscar previsão');

        const resultado = await response.json();

        // Mostrar previsão formatada
        loading.style.display = "none";
        conteudo.innerHTML = `<pre style="white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.6; margin-bottom: 20px;">${resultado.previsao || resultado.mensagem || 'Previsão não disponível'}</pre>
        <button onclick="document.getElementById('modalPrevisao').style.display='none'" style="background: #1976d2; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; cursor: pointer; font-weight: 600; display: block; margin: 0 auto;">Fechar</button>`;

      } catch (erro) {
        loading.style.display = "none";
        conteudo.innerHTML = `<div style="text-align: center; padding: 20px;">
          <p style="color: #d32f2f;">❌ Erro ao carregar previsão:</p>
          <p><strong>${erro.message}</strong></p>
          <p style="font-size: 12px; color: #999; margin-top: 12px;">URL: ${apiUrl}/previsao<br>Dias à frente: ${diasAFrente}</p>
          <button onclick="document.getElementById('modalPrevisao').style.display='none'" style="margin-top: 20px; background: #1976d2; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 16px; cursor: pointer; font-weight: 600;">Fechar</button>
        </div>`;
        console.error('Erro detalhado:', erro);
      }
    });

    // Fechar modal ao clicar no X ou fora do conteúdo
    document.getElementById("fecharPrevisao").addEventListener("click", () => {
      document.getElementById("modalPrevisao").style.display = "none";
    });

    document.getElementById("modalPrevisao").addEventListener("click", (e) => {
      if (e.target.id === "modalPrevisao") {
        document.getElementById("modalPrevisao").style.display = "none";
      }
    });
  </script>

  <!-- Modal Previsão do Tempo -->
  <div id="modalPrevisao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: white; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
      <button id="fecharPrevisao" style="position: absolute; top: 12px; right: 12px; background: #f5f5f5; border: none; font-size: 28px; cursor: pointer; color: #666; line-height: 1; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='#e0e0e0'" onmouseout="this.style.background='#f5f5f5'">×</button>
      <h2 style="margin: 0 0 20px 0; color: #1976d2; font-size: 20px;">🌤️ Previsão de Navegação</h2>
      <div id="previsaoLoading" style="text-align: center; padding: 40px 0;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #1976d2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p style="margin-top: 16px; color: #666;">Carregando previsão...</p>
      </div>
      <div id="previsaoConteudo"></div>
    </div>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
